name: Workflow-02 Destroy Workflow
on: workflow_dispatch

permissions:
  id-token: write # REQUIRED for OIDC
  contents: read        
  
jobs:
  Destroy-Resources:
    runs-on: ubuntu-24.04
    environment: 
        name: payg-swarnka-01
    env:
      ARM_USE_OIDC: true # Important: Use OIDC Auth
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    defaults:
      run:
        working-directory: ./Storage-Account/
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show Files
        run: ls -ltra

      - name: Azure Login using OIDC
        uses: azure/login@v3
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Install Az PowerShell Modules
        shell: pwsh
        run: |
          Install-Module Az -Scope CurrentUser -Repository PSGallery -Force
      
      - name: Run Cleanup Script
        shell: pwsh
        run: |
           ./Scripts/cleanup.ps1 -ResourceGroupName "rsw-alzd-p-cin-rsg-devops" -StorageAccountName "rswdevopstfstore"    
 


 